<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
    </title>
    <style>
        .mainBlock {
            display: flex;
            flex-direction: column;
            width: 1000px;
            min-height: 750px;
            margin-left: calc((100% - 1000px)/2);
        }

        .bottomContentBLock {
            min-height: 500px;
            margin-top: 15px;
            display: flex;
        }

        .leftBlock {
            margin-top: 10px;
            width: 233px;
            padding-right: 15px;
            margin-right: 30px;
            border-right: 1px solid #e3e3e3;
        }

        .topBigTitle {

            background-color: #772f91;
            height: 54px;
            line-height: 54px;
            width: 233px;
            font-size: 1.8rem;
            text-align: center;
            font-weight: bold;
            color: #fff;
        }

        .menuName {
            cursor: pointer;
            height: 53px;
            border-bottom: 1px solid #e3e3e3;
            text-align: center;
            line-height: 53px;
        }

        .menuName:hover {
            background-color: #f5f5f5;
            color: #772f91;
        }

        .newLine {
            cursor: pointer;
            display: flex;
            height: 30px;
            line-height: 30px;
            margin-bottom: 5px;
            border-bottom: 1px solid #efefef;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 1;
            overflow: hidden;
        }

        .newLine:hover {
            background-color: #efefef;
        }

        .lineContent {
            color: #666666;
            flex: 1;
        }

        .lineDate {
            color: #999999;
            font-size: 13px;
        }

        .page {
            margin: auto;
            margin-top: 20px;
        }

        .bread {
            display: flex;
            font-size: 15px;
            border-bottom: 2px solid #772f91;
            padding-bottom: 5px;
            margin-bottom: 15px;
            color: #772f91;
        }

        .bread .content {
            cursor: pointer;
            font-weight: bold;
        }

        .bread .content:hover {
            opacity: 0.75;
        }
    </style>
</head>

<body>
    <cms-component>head</cms-component>
    <div class="mainBlock">
        <div class="bottomContentBLock">
            <cms-list class="leftBlock">
                <list-parent>
                    <div class="topBigTitle">
                        <list-name></list-name>
                    </div>
                    <list-list>
                        <div class="menuName">
                            <list-template>
                                <list-name></list-name>
                            </list-template>
                        </div>
                    </list-list>
                </list-parent>
            </cms-list>
            <cms-list style="margin-top: 15px;flex: 1;" pagetitle>
                <cms-list class="bread">
                    <div class="content" onclick="window.location.href=BaseURL+'/index.html'">
                        首页
                    </div>
                    >&nbsp;&nbsp;
                    <list-parent>
                        <list-name class="content"></list-name>
                    </list-parent>
                    &nbsp;&nbsp;>&nbsp;&nbsp;
                    <list-name class="content"></list-name>
                </cms-list>
                <list-node limit="15" order="desc" style="display: flex;flex-direction: column;">
                    <node-template class="newLine">
                        <cms-node data="n_lxovt0o6">
                            <node-cover style="width: 25px;height: 25px;margin-top: 2px;"></node-cover>
                        </cms-node>
                        <node-title class="lineContent"></node-title>
                        <node-date format="YYYY-MM-DD" class="lineDate"></node-date>
                    </node-template>
                    <list-pagination class="page"></list-pagination>
                </list-node>
            </cms-list>
        </div>
    </div>
    <cms-component>foot</cms-component>
</body>

</html>
