<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/aheadUI.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .card {
            background-color: #fff;
            flex: 1;
            padding: 20px;
            margin: 20px;
            box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.1);
            border: 1px solid #efefef;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }

        .cardTitle {
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="cardTitle">全局搜索</div>
        <info-line label="标签"><span class="componentName">cms-search-result</span></info-line>
        <info-line label="功能">加载全局搜索</info-line>
        <div style="line-height: 20px;font-size: 14px;color: #666;margin-top: 15px;margin-bottom: 10px">
            流程：使用form提交表单至目标显示页面，显示页面中使用cms-search-result标签自动加载搜索请求和结果
        </div>

        <table cellspacing="0" cellpadding="2">
            <thead>
                <tr>
                    <th style="width:150px;">属性名称</th>
                    <th>说明</th>
                    <th style="width:150px;">默认值</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>empty</td>
                    <td>当没有搜索到相关内容时显示的文本</td>
                    <td>未搜索到相关内容</td>
                </tr>
            </tbody>
        </table>

        <a-html title="表单提交代码示例">
            <form action="搜索结果展示页面.html" method="get">
                <div class="inputBlock">
                    <!-- 全局搜索的最低字数要求为五个字，后台也会有搜索请求的字数限制 -->
                    <input name="search" placeholder="请输入搜索内容" />
                    <button type="submit" class="searchButton">
                        搜索
                    </button>
                </div>
            </form>
        </a-html>
        <a-html title="结果页加载结果" style="margin-top: 15px">
            <cms-search-result>
                <!-- 使用方法和list-node一致 -->
                <div>
                    <node-title></node-title>
                    <node-date></node-date>
                </div>
                <list-pagination></list-pagination>
            </cms-search-result>
        </a-html>
    </div>
</body>

</html>
<script src="../js/aheadUI.js"></script>
<script src="../js/base.js"></script>
