<script>
	const url = 'https://template.jxuspt.com/apply/submitApply'
	document.getElementById('submit').onclick = () => {

		document.getElementById('form').submit(async (e) => {
			if (e.sex.man) e.sex = "男"
			if (e.sex.woman) e.sex = "女"
			if (e.level.un) e.level = "本科"
			if (e.level.sp) e.level = "专科"
			let result = await axios.post(url, e)
			if (result.data == 200) {
				document.tip.success("      提交成功      ", 2500)
				document.getElementById('form').clear()
			}
		})
	}
	const spMajor = [{ label: "大数据技术", value: "大数据技术" },
	{ label: "云计算技术应用", value: "云计算技术应用" },
	{ label: "计算机网络技术", value: "计算机网络技术" },
	{ label: "信息安全技术应用", value: "信息安全技术应用" },
	{ label: "大数据与会计", value: "大数据与会计" },
