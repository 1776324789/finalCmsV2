<script>
  let data = [];
  fetch(`https://zhaosheng.jxuspt.com/data/someInfo.json?` + Date.now())
    .then((response) => response.json())
    .then((res) => {
      data = res;
      console.log(res);
    })
    .catch((error) => {
      console.error(error);
    });

  function search() {
    const examId = document.getElementById("stuId").value;
    const id = document.getElementById("stuIdNo").value;

    const res = data.find((item) => item.id == id && item.examId == examId);
    if (res == null) {
      message("未查询到学生信息");
    } else {
      message("正在下载...");
      downloadPDF(res.url, res.name + " " + res.examId + ".pdf");
    }
  }

  function message(str) {
    document.getElementById("message").innerText = str;
    setTimeout(() => {
      document.getElementById("message").innerText = "";
    }, 2500);
  }
  function downloadPDF(url, filename = "file.pdf") {
    fetch(url)
      .then((res) => res.blob())
      .then((blob) => {
        const blobUrl = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);

        a.click();

        document.body.removeChild(a);
        window.URL.revokeObjectURL(blobUrl);
      })
      .catch((err) => {
        console.error("下载失败:", err);
      });
  }
</script>
