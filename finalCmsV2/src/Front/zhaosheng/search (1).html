<script src="js/axios.min.js"></script>
<script>
  const baseUrl = "https://template.jxuspt.com";
  const main = document.getElementById("main");
  const name = document.getElementById("name");
  const id = document.getElementById("id");
  const empty = document.getElementById("empty");
  const infoBlock = dg("infoBlock");
  let searching = false;
  const name1 = document.getElementById("name1");
  const sex = document.getElementById("sex");
  const school = document.getElementById("school");
  const major = document.getElementById("major");
  async function search() {
    if (name.value == "" || id.value == "") {
      empty.innerText = "请输入完整内容再查询";
      showEmpty();
      return;
    }

    if (searching) {
      return;
    }
    searching = true;
    document.getElementById("searchButton").innerText = "正在查询...";
    infoBlock.style.display = "none";
    const result = await axios.post(baseUrl + "/search", {
      name: name.value,
      code: id.value,
    });
    searching = false;
    document.getElementById("searchButton").innerText = "查询";
    if (result.data.data == null) {
      empty.innerText = "未查询到结果";
      showEmpty();
    } else if (result.data.data != null) {
      infoBlock.style.display = "block";
      main.style.marginTop = "10px";
      let data = result.data.data;
      name1.innerText = data.name;
      stuCode.innerText = data.code;
      document.getElementById("score").innerText = data.score;
    } else if (result.data.code == 400) {
      empty.innerText = "内部异常，请稍后再试";
      showEmpty();
    }

    // main.style.marginTop = "10px"
  }

  function showEmpty() {
    for (let a = 0; a < 10; a++) {
      setTimeout(() => {
        document.getElementById("empty").style.display = "block";
        document.getElementById("empty").style.marginTop = (9 - a + 2) * 10 + "px";
        document.getElementById("empty").style.opacity = a * 0.1;
      }, 17 * a);
    }
    setTimeout(() => {
      document.getElementById("empty").style.display = "none";
    }, 2000);
  }

  function dg(id) {
    return document.getElementById(id);
  }
</script>
