    <script>
        const phoneMenu = document.getElementById('phoneMenu')
        const phoneMenuButton = document.getElementById("phoneMenuButton")
        const PhontMenuCover = document.getElementById("PhontMenuCover")
        let show = false
        phoneMenuButton.onclick = () => {
            if (show) {
                phoneMenu.style.left = "-175px"
                PhontMenuCover.style.display = "none"
            } else {
                phoneMenu.style.left = "0"
                PhontMenuCover.style.display = "block"
            }
            show = !show
        }
        PhontMenuCover.onclick = () => {
            phoneMenu.style.left = "-175px"
            PhontMenuCover.style.display = "none"
            show = false
        }
    </script>
