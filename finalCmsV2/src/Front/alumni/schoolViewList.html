<script>
    let navItem = null
    let clickedEl = null
    let timer = null

    const topMenuTarget = document.getElementsByClassName('topMenu')[0]
    topMenuTarget.addEventListener('click', (event) => {
        if (clickedEl) {
            clickedEl.style.visibility = ''
            clickedEl.children[1].style.visibility = 'hidden'
            clickedEl.children[1].style.pointerEvents = 'none'
            reset('auto')
        }

        if (event.target.classList[0] == 'content') {
            clickedEl = event.target
            if (event.target.children[1]) {
                event.target.children[1].style.visibility = 'visible'
                event.target.children[1].style.pointerEvents = ''
                reset('none')
                clearTimeout(timer)
                timer = setTimeout(() => {
                    event.target.style.visibility = ''
                    event.target.children[1].style.visibility = 'hidden'
                    event.target.children[1].style.pointerEvents = 'none'
                    reset('auto')
                }, 12000)
            }

        }
    })

    document.addEventListener('click', (event) => {
        if (event.target.classList[0] == 'content' || event.target.classList[0] == 'menuChild') return
        if (clickedEl) {
            clickedEl.style.visibility = ''
            clickedEl.children[1].style.visibility = 'hidden'
            clickedEl.children[1].style.pointerEvents = 'none'
            reset('auto')
        }
    })

    function reset(val) {
        const list = document.getElementsByClassName('content')
        for (const element of list) element.style.pointerEvents = val
    }

</script></cms-component>
