<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>江西软件职业技术大学经管学院</title>
    <style>
        html,
        body {
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }
    </style>

<body style="background-color: #f9f9f9;" ->
    <cms-component data="l_m7iiesie">head</cms-component>
    <style>
        img {
            max-width: 100%;
            height: unset !important;
        }

        @media screen and (min-width: 800px) {
            .articleMainBlock {
                width: 1000px;
                min-height: 750px;
                margin: auto;
                background: #fff;
                padding: 15px;
                display: flex;
                flex-direction: column;
            }

            .articleMainBlock .menuBlock {
                width: 100px;
                cursor: pointer;
                height: 30px;
                display: flex;
            }

            .articleMainBlock .menuBlock:hover img {
                margin-top: -2px;
                width: 34px;
                height: 34px;
                margin-right: -4px;
            }

            .articleMainBlock .menuBlock:hover .back {
                font-weight: bold;
            }

            .articleMainBlock .menuBlock img {
                width: 30px;
                height: 30px;
            }

            .articleMainBlock .menuBlock .back {
                margin-left: 7px;
                color: #3585f9;
                line-height: 30px;
                flex: 1;
            }

            .articleMainBlock .title {
                width: 1000px;
                line-height: 30px;
                margin-top: 20px;
                color: #444444;
                font-size: 26px;
                font-weight: bold;
                text-align: center;
            }

            .articleMainBlock .infoBlock {
                margin-top: 10px;
                height: 30px;
                line-height: 30px;
                color: #888888;
                font-size: 14px;
                margin-left: auto;
                margin-right: auto;
                display: flex;
            }

            .articleMainBlock .infoBlock img {
                width: 24px;
                height: 24px;
                margin-top: 3px;
                margin-right: 15px;
            }

            .articleMainBlock .articleContent {
                margin-top: 20px;
                width: 1000px;
                margin-left: auto;
                margin-right: auto;
                font-size: 14px;
                color: #666666;
                line-height: 20px;
                word-break: break-all;
            }

            .articleMainBlock .prevNext {
                margin-left: 130px;
                color: #444444;
                padding-top: 20px;
                border-top: 1px solid #444444;
                margin-right: 130px;
            }
        }

        @media screen and (max-width: 800px) {
            .articleMainBlock {
                width: calc(100% - 30px);
                min-height: 750px;
                margin: auto;
                background: #fff;
                padding: 15px;
                display: flex;
                flex-direction: column;
            }

            .articleMainBlock .menuBlock {
                width: 100px;
                cursor: pointer;
                height: 30px;
                display: flex;
            }

            .articleMainBlock .menuBlock:hover img {
                margin-top: -2px;
                width: 34px;
                height: 34px;
                margin-right: -4px;
            }

            .articleMainBlock .menuBlock:hover .back {
                font-weight: bold;
            }

            .articleMainBlock .menuBlock img {
                width: 30px;
                height: 30px;
            }

            .articleMainBlock .menuBlock .back {
                margin-left: 7px;
                color: #3585f9;
                line-height: 30px;
                flex: 1;
            }

            .articleMainBlock .title {
                width: 100%;
                padding-top: 10px;
                padding-bottom: 10px;
                margin-top: 20px;
                color: #444444;
                font-size: 26px;
                font-weight: bold;
                text-align: center;
            }

            .articleMainBlock .infoBlock {
                margin-top: 10px;
                height: 30px;
                line-height: 30px;
                color: #888888;
                font-size: 14px;
                margin-left: auto;
                margin-right: auto;
                display: flex;
            }

            .articleMainBlock .infoBlock img {
                width: 24px;
                height: 24px;
                margin-top: 3px;
                margin-right: 15px;
            }



            .articleMainBlock .articleContent {
                margin-top: 20px;
                width: 90%;
                margin-left: auto;
                margin-right: auto;
                font-size: 14px;
                color: #666666;
                line-height: 20px;
                word-break: break-all !important;
            }


            .articleMainBlock .prevNext {
                margin-left: 15%;
                margin-right: 15%;
                color: #444444;
                padding-top: 20px;
                border-top: 1px solid #444444;
            }
        }

        .bottomArticleSwitcher {
            display: flex;
            flex-direction: column;
            border-top: 1px solid #e3e3e3;
            padding-top: 15px;
        }

        .bottomArticleSwitcher .switchButton {
            display: flex;
            font-size: 16px;
            height: 30px;
            line-height: 30px;
            margin-bottom: 15px;
        }

        .bottomArticleSwitcher .switchButton .label {
            font-size: 14px;
            font-weight: bold;
            color: #777777;
            margin-right: 5px;
        }

        .bottomArticleSwitcher .switchButton .label:after {
            content: "：";
        }

        .bottomArticleSwitcher .switchButton .articleName {
            color: #772f91;
            cursor: pointer;
        }

        .bottomArticleSwitcher .switchButton .articleName:hover {
            opacity: 0.75;
        }
    </style>
    <cms-node class="articleMainBlock">
        <div data="n_m7itvdu7" class="menuBlock" onclick="javascript:window.history.go(-1);" style="line-height: 30px;">
            <span class="icon-arrow-go-back-fill" class="back" style="color: #55aaff;"></span>
            <div class="back">返回</div>
        </div>
        <div class="title">
            <node-title></node-title>
        </div>
        <div class="infoBlock">
            <div>
                浏览：<node-clicks></node-clicks>
            </div>
            <div>
                &nbsp;&nbsp;&nbsp;发布：
                <node-date format="YYYY-MM-dd"></node-date>
            </div>
        </div>
        <node-content class="articleContent"></node-content>
        <div class="bottomArticleSwitcher">
            <div class="switchButton">
                <div class="label">上一篇</div>
                <node-prev class="articleName"></node-prev>
            </div>
            <div class="switchButton">
                <div class="label">下一篇</div>
                <node-next class="articleName"></node-next>
            </div>
        </div>

    </cms-node>

    <cms-component>foot</cms-component>
</body>

</html>
