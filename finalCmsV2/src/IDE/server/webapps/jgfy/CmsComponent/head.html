<cms-component>
    <style>
        html,
        body {
            padding: 0;
            margin: 0;
        }

        .WEBHEAD .list {
            display: flex;
        }

        .WEBHEAD .contentName {
            color: #fff;
            height: 40px;
            text-align: center;
            line-height: 40px;
            min-width: 70px;
            padding-left: 20px;
            padding-right: 20px;
            cursor: pointer;
            font-size: 16px;
        }

        .WEBHEAD .contentName:hover {
            color: #55aaff;
        }

        .WEBHEAD .floatWindow {
            z-index: 10;
            background-color: #fff;
            position: absolute;
            display: none;
            width: 100%;
            box-shadow: 0 0 3px #b9b9b9;
            flex-direction: column;
        }

        .WEBHEAD .row:hover .floatWindow {
            animation: slideIn 0.25s ease forwards;
            display: flex;

        }

        @keyframes slideIn {
            0% {
                transform: translateY(50px);
                opacity: 0;
            }

            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .WEBHEAD .menuOption {
            color: #666;
            display: block;
            height: 45px;
            text-align: center;
            line-height: 45px;
            width: 100%;
            cursor: pointer;
            font-size: 14px;
        }

        .WEBHEAD .menuOption:hover {
            background-color: #e9e9e9;
        }

        .WEBHEAD .menuBlock {
            width: 100vw;
            display: flex;
            background: linear-gradient(30deg, #772f91, #772f91, #772f91, #b146d8, #2196F3, #2196F3, rgb(33, 243, 96));
        }

        .WEBHEAD .pageTopBlock {
            width: 100vw;
            height: 70px;
            background-color: #fff !important;
            display: flex;
        }

        .WEBHEAD .topBlockTitle {
            font-size: 30px;
            line-height: 70px;
            margin-left: 30px;
            color: #fff;
        }

        .WEBHEAD .searchBlock {
            margin-right: 100px;
        }

        .WEBHEAD .inputBlock {
            display: flex;
            margin-top: 17px;
            overflow: hidden;
            width: 250px;
            border-radius: 18px;
            height: 36px;
            background-color: #fff;
            border: 1px solid #bfbfbf;
        }

        .WEBHEAD .inputBlock input {
            height: 30px;
            flex: 1;
            text-indent: 15px;
            border: 0;
            margin-top: 2px;
            outline: none;
        }

        .WEBHEAD .row {
            position: relative;
        }

        .WEBHEAD .searchButton {
            margin-top: 3px;
            border: 0;
            margin-right: 3px;
            cursor: pointer;
            border-radius: 15px;
            width: 30px;
            height: 30px;
        }

        .WEBHEAD .searchButton:hover {
            color: #55aaff;
            background-color: #eeeeee;
        }


        @media screen and (min-width: 800px) {
            .WEBHEAD {
                display: block;
            }

            .PHONEHEAD {
                display: none;
            }

            .setUp {
                display: none;
            }
        }

        @media screen and (max-width: 800px) {
            .WEBHEAD {
                display: none;
            }

            .PHONEHEAD {
                display: block;
                width: 100vw;
                position: fixed;
                top: 0;
                left: 0;
                z-index: 100;
            }

            #LRdiv0 {
                display: none !important;
            }

            .setUp {
                display: block;
            }
        }

        .PHONEHEAD .topBlockTitle {
            color: #fff;
            margin-top: -1px;
            height: 35px;
            font-size: 16px;
            line-height: 35px;
            text-indent: 25px;
        }

        .PHONEHEAD .fatherBlock {
            height: 35px;
            text-indent: 15px;
            color: #fff;
            line-height: 35px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .PHONEHEAD .childBlock {
            height: 35px;
            text-indent: 35px;
            color: #fff;
            line-height: 35px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .PhontMenuCover {
            display: none;
            z-index: -1;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.5);
        }
    </style>
    <link rel="stylesheet" href="./css/MoonIcon/style.css">
    <div class="PHONEHEAD">
        <div style="display: flex; background: linear-gradient(45deg,  #772f91,  #772f91,   #2196F3);">
            <div style="flex: 1;">
                <div class="topBlockTitle" style="font-weight: bold;">江西软件职业技术大学</div>
                <div class="topBlockTitle">经济管理学院</div>
            </div>
            <div style="width: 75px;color: #fff;line-height: 60px;text-align: center;" id="phoneMenuButton">
                <i class="icon-menu-fill" style="font-size: 35px;"></i>
            </div>
        </div>
        <div id="phoneMenu"
            style="width: 175px;transition: left 0.3s; z-index: 1000; height:calc(100vh - 68px); position: fixed;left: -175px;background-color: #772f91;overflow: auto;">
            <cms-list data="l_m7iiesie">
                <list-list style="margin-left: 5px;">
                    <list-template class="fatherBlock">
                        <list-name></list-name>
                    </list-template>
                    <list-list style="display: flex;flex-direction: column;margin-left: 5px;text-align: left;">
                        <list-template class="childBlock">
                            <list-name></list-name>
                        </list-template>
                    </list-list>
                </list-list>
            </cms-list>
        </div>
        <div class="PhontMenuCover" id="PhontMenuCover"></div>
    </div>
    <div style="width: 100vw;height: 68px;" class="setUp"></div>
    <script>
        const phoneMenu = document.getElementById('phoneMenu')
        const phoneMenuButton = document.getElementById("phoneMenuButton")
        const PhontMenuCover = document.getElementById("PhontMenuCover")
        let show = false
        phoneMenuButton.onclick = () => {
            if (show) {
                phoneMenu.style.left = "-175px"
                PhontMenuCover.style.display = "none"
            } else {
                phoneMenu.style.left = "0"
                PhontMenuCover.style.display = "block"
            }
            show = !show
        }
        PhontMenuCover.onclick = () => {
            phoneMenu.style.left = "-175px"
            PhontMenuCover.style.display = "none"
            show = false
        }
    </script>

    <div class="WEBHEAD">
        <div class="pageTopBlock" style="padding-bottom: 20px;padding-top: 20px;">
            <cms-node data="n_m7ilout7">
                <node-cover quality="1" style="height: 100%;margin-left: 200px;"></node-cover>
            </cms-node>
            <div style="flex: 1;"></div>
            <div class="searchBlock">
                <form action="search.html" method="get" onsubmit="return validateForm()">
                    <div class="inputBlock">
                        <input id="searchContent" name="search" type="text" placeholder="请输入搜索内容">
                        <button type="submit" class="searchButton">
                            <span class="icon-search-2-line "></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <cms-list class="menuBlock" data="l_m7iiesie">
            <div style="flex: 1;"></div>
            <list-list class="list">
                <div class="row">
                    <list-template>
                        <list-name class="contentName"></list-name>
                    </list-template>
                    <div class="floatWindow">
                        <list-list class="menuOption">
                            <list-template>
                                <list-name></list-name>
                            </list-template>
                        </list-list>
                    </div>
                </div>
            </list-list>
            <div style="flex: 1;"></div>
        </cms-list>
    </div>
</cms-component>
