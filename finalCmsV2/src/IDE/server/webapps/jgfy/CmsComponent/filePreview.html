<cms-component>

            transform: translate(0, -100%);

            font-size: 18px;
        }

            cursor: pointer;
            height: 46px;
            line-height: 46px;
            text-align: center;
            color: #666666;
        }

        .listNewsMenu:hover {
            background-color: #f9f9f9;
            font-weight: bold;
            color: #3576B5;
        }


        .listNewsRightBlock {
            position: relative;
            flex: 1;
            margin-left: 15px;

            flex-direction: column;
            padding-left: 15px;
            padding-right: 15px;
        }

        .listNewPageTitle {
            height: 40px;
            font-size: 16px;
            font-weight: bold;
            line-height: 40px;
            color: #3576B5;
            border-bottom: 1px solid #3576B5;
        }

            display: flex;
            flex-wrap: wrap;
        }

            text-align: center;

            line-height: 30px;
            width: 60px;
            list-style-type: none;

            border-radius: 3px;

        .dreamer-ul li:hover {
            background-color: #f8f8f8;
        }

        .dreamer-ul li a {
            text-decoration: none;

        }

            display: flex;
            align-items: center;
        }

        .listNewNews .listNewsDate {
            display: flex;

        }

                min-height: 600px;
                display: flex;
            }

                background-color: #fff;

                min-height: 600px;
                display: flex;

                margin-bottom: 20px;

                flex-direction: column;
