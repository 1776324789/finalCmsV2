<cms-component>
    <style>
        .submitMainBlock {
            background-color: #fff;
            width: 750px;
            box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.25);
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 30px;
            margin: auto;
            margin-top: 30px;
            margin-bottom: 30px;
        }

        .bgi {
            z-index: -1;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 100vw;
        }
    </style>
    <img src="./img/teacher_bg.jpg" class="bgi" />
    <cms-list class="submitMainBlock" pagetitle>
        <div style="display: flex;">
            <span
                style="margin-bottom: 15px;display: block;margin-top: 15px;font-size: 16px;color: #333;font-weight: bold;margin-left: 5px;">To:</span>
            <list-name
                style="margin-bottom: 15px;display: block;margin-top: 15px;font-size: 16px;color: #333;font-weight: bold;margin-left: 5px;"></list-name>
        </div>

        <list-submit>
            <div style="display: flex;width: 100%;">
                <span style="margin-left: 5px;">标题：</span>
                <submit-title placeholder="请输入标题"
                    style="width:450px; height:30px;flex:1; border-radius: 3px;border:1px solid #ccc;outline: none;text-indent: 10px;margin-bottom: 15px;">
                </submit-title>
            </div>

            <submit-text placeholder="请输入内容" style="background-color: #fff5e991;" max="5000"
                height="700px"></submit-text>
            <div style="display: flex;margin-top: 15px;">
                <div style="flex: 1;"></div>
                <div>
                    <div style="display: flex;">
                        <submit-code color="#55aaff"></submit-code>
                        <submit-input placeholder="请输入验证码"
                            style="width: 150px;height:30px;border-radius: 3px;border:1px solid #ccc;margin-left: 5px;outline: none;text-indent: 10px;"></submit-input>
                    </div>
                    <style>
                        .submitButton {
                            cursor: pointer;
                            width: 300px;
                            margin: auto;
                            background-color: #8728AA;
                            height: 35px;
                            line-height: 35px;
                            color: #fff;
                            border-radius: 3px;
                            margin-top: 15px;
                            text-align: center;
                        }

                        .submitButton:hover {
                            opacity: 0.8;
                        }
                    </style>
                    <submit-button class="submitButton">提交</submit-button>
                </div>
                <div style="flex: 1;"></div>
            </div>
        </list-submit>
    </cms-list>
</cms-component>
