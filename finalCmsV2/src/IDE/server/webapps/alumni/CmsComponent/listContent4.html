<style>
    .listNewsTopMenu {
        height: 45px;
        font-size: 16px;
        color: #fff;
        text-align: center;
        line-height: 45px;
        background-image: url("/img/b2c436f885e69123eabb86ba9b8e36e2.png");
        background-size: 200%;
    }

    .listNewsMenu {
        cursor: pointer;
        height: 35px;
        line-height: 35px;
        text-align: center;
        color: #666666;
    }

    .listNewsMenu:hover {
        background-color: #f9f9f9;
        font-weight: bold;
    }

    .nowPage {
        border-left: 5px solid #9522A5;
        background-color: #f9f9f9;
        font-weight: bold;
    }

    .listNewsRightBlock {
        position: relative;
        flex: 1;
        border-left: 1px solid #a8a8a8;
        margin-left: 15px;
        display: flex;
        flex-direction: column;
        padding-left: 15px;
        padding-right: 15px;
    }

    .listNewPageTitle {
        height: 40px;
        font-size: 16px;
        font-weight: bold;
        line-height: 40px;
        color: #666666;
        border-bottom: 1px solid #a8a8a8;
    }

    .listpages {
        width: calc(100% - 40px);
        padding: 20px;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
    }

    .listpages .dreamer-ul {
        display: flex;
        flex-wrap: wrap;
    }

    .dreamer-ul li {
        cursor: pointer;
        text-align: center;
        margin-left: 5px;
        margin-right: 5px;
        margin-bottom: 5px;
        height: 30px;
        line-height: 30px;
        width: 60px;
        list-style-type: none;
        border: 1px solid #9522A5;
        border-radius: 3px;
    }

    .dreamer-ul li:hover {
        background-color: #f8f8f8;
    }

    .dreamer-ul li a {
        text-decoration: none;
        color: #9522A5;
    }


    .listNewNews:hover {
        background-color: #fafafa;
    }

    .listNewNews:hover .title {
        font-weight: bold
    }

    .listNewNews .title {
        text-indent: 15px;
        flex: 1;
        font-size: 16px;
    }

    @media screen and (min-width: 800px) {
        .leftRightBox {
            background-color: #fff;
            width: 1000px;
            margin: auto;
            padding: 15px;
            min-height: 600px;
            display: flex;
        }

        .leftRightBox .leftBlock {
            width: 175px;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .listNewNews {
            border-left: 3px solid #9522A5;
            background: linear-gradient(to right, #9522A5, #fff);
            cursor: pointer;
            color: #fff;
            margin-left: 30px;
            width: 550px;
            display: flex;
            height: 50px;
            margin-top: 30px;
            line-height: 50px;
        }
    }

    @media screen and (max-width: 800px) {
        .leftRightBox {
            background-color: #fff;
            width: calc(100% - 30px);
            padding: 15px;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }

        .leftRightBox .leftBlock {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .listNewNews {
            margin-left: 10px;
            width: calc(100% -30px);
            border-left: 3px solid #9522A5;
            background: linear-gradient(to right, #9522A5, #fff);
            cursor: pointer;
            color: #fff;
            display: flex;
            height: 50px;
            margin-top: 30px;
            line-height: 50px;
        }
    }

    .secondName {
        height: 30px;
        font-weight: bold;
        margin-left: 40px;
        color: #9522A5;
        line-height: 30px;
        border-bottom: 1px solid #9522A5;
        border-left: 3px solid #9522A5;
        text-indent: 15px;
    }
</style>
<cms-component>
    <cms-list class="leftRightBox">
        <list-parent>
            <div class="leftBlock">
                <div class="listNewsTopMenu">校友会</div>
                <list-list>
                    <list-template class="listNewsMenu" focus:class="nowPage">
                        <list-name></list-name>
                    </list-template>
                </list-list>
            </div>
        </list-parent>
        <cms-list class="listNewsRightBlock" pagetitle>
            <list-name class="listNewPageTitle"></list-name>
            <list-list page="1" limit="15">
                <div class="listNewNews">
                    <list-name class="title"></list-name>
                </div>
                <list-node style="margin-left: 40px;">
                    <node-template style="width: 20%;height: 40px;line-height: 40px;color: #9522A5;cursor: pointer;">
                        <node-title></node-title>
                    </node-template>
                </list-node>
                <list-list>
                    <list-name class="secondName"></list-name>
                    <list-node style="margin-left: 50px;display: flex;flex-wrap: wrap;">
                        <node-template
                            style="width: 20%;height: 40px;line-height: 40px;color: #9522A5;cursor: pointer;">
                            <node-title></node-title>
                        </node-template>
                    </list-node>
                </list-list>
            </list-list>
        </cms-list>
    </cms-list>
</cms-component>
