<style>
    .listNewsTopMenu {
        height: 45px;
        font-size: 16px;
        color: #fff;
        text-align: center;
        line-height: 45px;
        background-image: url("/img/b2c436f885e69123eabb86ba9b8e36e2.png");
        background-size: 200%;
    }

    .listNewsMenu {
        cursor: pointer;
        height: 35px;
        line-height: 35px;
        text-align: center;
        color: #666666;
    }

    .listNewsMenu:hover {
        background-color: #f9f9f9;
        font-weight: bold;
    }

    .nowPage {
        border-left: 5px solid #9522A5;
        background-color: #f9f9f9;
        font-weight: bold;
    }

    .listNewsRightBlock {
        position: relative;
        flex: 1;
        border-left: 1px solid #a8a8a8;
        margin-left: 15px;
        display: flex;
        flex-direction: column;
        padding-left: 15px;
        padding-right: 15px;
    }

    .listNewPageTitle {
        height: 40px;
        font-size: 16px;
        font-weight: bold;
        line-height: 40px;
        color: #666666;
        border-bottom: 1px solid #a8a8a8;

    }

    .listpages {
        width: calc(100% - 40px);
        padding: 20px;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
    }

    .listpages .dreamer-ul {
        display: flex;
        flex-wrap: wrap;
    }

    .dreamer-ul li {
        cursor: pointer;
        text-align: center;
        margin-left: 5px;
        margin-right: 5px;
        margin-bottom: 5px;
        height: 30px;
        line-height: 30px;
        width: 60px;
        list-style-type: none;
        border: 1px solid #9522A5;
        border-radius: 3px;
    }

    .dreamer-ul li:hover {
        background-color: #f8f8f8;
    }

    .dreamer-ul li a {
        text-decoration: none;
        color: #9522A5;
    }


    .listNewNews:hover {
        background-color: #fafafa;
    }

    .listNewNews .title {
        text-indent: 15px;
        flex: 1;
        font-size: 16px;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 1;
        overflow: hidden;
    }

    @media screen and (min-width: 800px) {
        .leftRightBox {
            background-color: #fff;
            width: 1000px;
            margin: auto;
            padding: 15px;
            min-height: 600px;
            display: flex;
        }

        .leftRightBox .leftBlock {
            width: 175px;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .listNewNews {
            cursor: pointer;
            margin-left: 30px;
            display: flex;
            height: 40px;
            line-height: 40px;
            color: #666666;
            border-bottom: 1px solid #e3e3e3;
        }
    }

    @media screen and (max-width: 800px) {
        .leftRightBox {
            background-color: #fff;
            width: calc(100% - 30px);
            padding: 15px;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }

        .leftRightBox .leftBlock {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .listNewNews {
            margin-left: 10px;
            width: calc(100% -30px);
            cursor: pointer;
            color: #fff;
            display: flex;
            height: 50px;
            margin-top: 30px;
            line-height: 50px;
        }
    }

    .date {
        font-size: 13px;
        color: #888888;
    }
</style>
<cms-component>
    <cms-list class="leftRightBox">
        <list-parent>
            <div class="leftBlock">
                <div class="listNewsTopMenu">校友会</div>
                <list-list>
                    <list-template class="listNewsMenu" focus:class="nowPage">
                        <list-name></list-name>
                    </list-template>
                </list-list>
            </div>
        </list-parent>
        <cms-list class="listNewsRightBlock" pagetitle>
            <list-name class="listNewPageTitle"></list-name>
            <list-node page="1" limit="15" order="desc">
                <node-template class="listNewNews">
                    <node-title class="title">
                    </node-title>
                    <node-date format="YYYY-MM-DD" class="date">
                    </node-date>
                </node-template>
                <list-pagination style="margin-top: 30px;margin-left: 40px;"></list-pagination>
            </list-node>
        </cms-list>
    </cms-list>
</cms-component>
