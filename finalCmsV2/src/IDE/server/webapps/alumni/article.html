<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
        @media screen and (min-width: 800px) {
            .articleMainBlock {
                width: 1000px;
                min-height: 750px;
                margin: auto;
                background: #fff;
                padding: 15px;
                display: flex;
                flex-direction: column;
            }

            .articleMainBlock .menuBlock {
                width: 100px;
                cursor: pointer;
                height: 30px;
                display: flex;
            }

            .articleMainBlock .menuBlock:hover img {
                margin-top: -2px;
                width: 34px;
                height: 34px;
                margin-right: -4px;
            }

            .articleMainBlock .menuBlock:hover .back {
                font-weight: bold;
            }

            .articleMainBlock .menuBlock img {
                width: 30px;
                height: 30px;
            }

            .articleMainBlock .menuBlock .back {
                margin-left: 7px;
                color: #9522A5;
                line-height: 30px;
                flex: 1;
            }

            .articleMainBlock .title {
                width: 700px;
                line-height: 30px;
                margin-top: 20px;
                color: #444444;
                font-size: 26px;
                font-weight: bold;
                text-align: center;
                margin-left: 150px;
            }

            .articleMainBlock .infoBlock {
                margin-top: 10px;
                height: 30px;
                line-height: 30px;
                color: #888888;
                font-size: 14px;
                margin-left: auto;
                margin-right: auto;
                display: flex;
            }

            .articleMainBlock .infoBlock p img {
                width: 24px;
                height: 24px;
                margin-top: 3px;
                margin-right: 15px;
            }
            .articleMainBlock .articleContent img {
                width: 100%  !important;
            }
            .articleMainBlock .articleContent {
                margin-top: 20px;
                width: 700px;
                margin-left: auto;
                margin-right: auto;
                font-size: 14px;
                color: #666666;
                line-height: 20px;
                word-break: break-all;
            }

            .articleMainBlock .prevNext {
                margin-left: 130px;
                color: #444444;
                padding-top: 20px;
                border-top: 1px solid #444444;
                margin-right: 130px;
            }
        }

        @media screen and (max-width: 800px) {
            .articleMainBlock {
                width: calc(100% - 30px);
                min-height: 750px;
                margin: auto;
                background: #fff;
                padding: 15px;
                display: flex;
                flex-direction: column;
            }

            .articleMainBlock .menuBlock {
                width: 100px;
                cursor: pointer;
                height: 30px;
                display: flex;
            }

            .articleMainBlock .menuBlock:hover img {
                margin-top: -2px;
                width: 34px;
                height: 34px;
                margin-right: -4px;
            }

            .articleMainBlock .menuBlock:hover .back {
                font-weight: bold;
            }

            .articleMainBlock .menuBlock img {
                width: 30px;
                height: 30px;
            }

            .articleMainBlock .menuBlock .back {
                margin-left: 7px;
                color: #9522A5;
                line-height: 30px;
                flex: 1;
            }

            .articleMainBlock .title {
                width: 100%;
                padding-top: 10px;
                padding-bottom: 10px;
                margin-top: 20px;
                color: #444444;
                font-size: 26px;
                font-weight: bold;
                text-align: center;
            }

            .articleMainBlock .infoBlock {
                margin-top: 10px;
                height: 30px;
                line-height: 30px;
                color: #888888;
                font-size: 14px;
                margin-left: auto;
                margin-right: auto;
                display: flex;
            }

            .articleMainBlock .infoBlock img {
                width: 24px;
                height: 24px;
                margin-top: 3px;
                margin-right: 15px;
            }

            .articleMainBlock .articleContent img {
                width: 100%  !important;

            }

            .articleMainBlock .articleContent {
                margin-top: 20px;
                width: 90%;
                margin-left: auto;
                margin-right: auto;
                font-size: 14px;
                color: #666666;
                line-height: 20px;
                word-break: break-all;
            }

            .articleMainBlock .prevNext {
                margin-left: 15%;
                margin-right: 15%;
                color: #444444;
                padding-top: 20px;
                border-top: 1px solid #444444;
            }
        }

        .bottomArticleSwitcher {
            display: flex;
            flex-direction: column;
            border-top: 1px solid #e3e3e3;
            padding-top: 15px;
        }

        .bottomArticleSwitcher .switchButton {
            display: flex;
            font-size: 16px;
            height: 30px;
            line-height: 30px;
            margin-bottom: 15px;
        }

        .bottomArticleSwitcher .switchButton .label {
            font-size: 14px;
            font-weight: bold;
            color: #777777;
            margin-right: 5px;
        }

        .bottomArticleSwitcher .switchButton .label:after {
            content: "：";
        }

        .bottomArticleSwitcher .switchButton .articleName {
            color: #772f91;
            cursor: pointer;
        }

        .bottomArticleSwitcher .switchButton .articleName:hover {
            opacity: 0.75;
        }
    </style>
</head>

<body bgcolor="#f4f4f4">
    <cms-component>head</cms-component>
    <cms-node class="articleMainBlock" pagetitle>
        <div class="menuBlock" onclick="javascript:window.history.go(-1);">
            <img src="/img/back.png" />
            <div class="back">返回</div>
        </div>
        <node-title class="title">
        </node-title>
        <div class="infoBlock">
            <div>
                浏览：<node-clicks></node-clicks>
            </div>
            <div>
                &nbsp;&nbsp;&nbsp;发布：
                <node-date format="YYYY-MM-DD"></node-date>
            </div>
        </div>
        <node-content class="articleContent">
        </node-content>
        <div class="bottomArticleSwitcher">
            <div class="switchButton">
                <div class="label">上一篇</div>
                <node-prev class="articleName"></node-prev>
            </div>
            <div class="switchButton">
                <div class="label">下一篇</div>
                <node-next class="articleName"></node-next>
            </div>
        </div>
    </cms-node>

    <cms-component>foot</cms-component>
</body>

</html>
