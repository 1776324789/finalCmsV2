<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport"
		content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<!-- 禁止百度转码 -->
	<meta http-equiv="Cache-Control" content="no-siteapp">
	<!-- uc强制竖屏 -->
	<meta name="screen-orientation" content="portrait">
	<!-- QQ强制竖屏 -->
	<meta name="x5-orientation" content="portrait">
	<title>录取查询</title>


	<style>
		@media screen and (min-width: 800px) {
			.container {
				width: 1200px;
				padding: 15px;
				margin: 0 auto;
				margin-bottom: 10px;
				min-height: 500px;
			}

			.container .searchBar {
				width: 90%;
				margin-left: 5%;
				background-color: #f7f7f7;
				padding-top: 15px;
				padding-bottom: 10px;
				display: flex;
				border-top: 5px solid #772f91;
			}

			.label {
				width: 150px;
				color: #000;
				font-size: 14px;
				text-align: right;
				margin-left: 40px;
				padding-left: 10px;
				padding-right: 10px;
				line-height: 30px;
			}

			.info {
				color: #8d8d8d;
				text-align: left;
				line-height: 30px;
				flex: 1;
			}

			.search {
				cursor: pointer;

				border: 0;
				background-color: #772f91;
				color: #fff;
				width: 150px;
				height: 30px;
			}

			.search:hover {
				opacity: 0.7;
			}

			.input {
				float: left;
				width: 200px;
				font-size: 13px;
				height: 27px;
				text-indent: 15px;
				border-radius: 2px;
				border: 1px solid #bcbcbc;
			}

			.messgae {
				background-color: #f7f7f7;
				width: 100%;
				height: 25px;
				text-align: center;
				color: #ff5255;
				width: 90%;
				margin-left: 5%;
			}

			@keyframes loader-animation {
				0% {
					transform: rotate(0deg);
				}

				100% {
					transform: rotate(360deg);
				}
			}

			.loader {

				position: relative;
				width: 40px;
				height: 40px;
				margin-left: -47px;
			}

			.loader::before {
				content: "";
				position: absolute;
				top: 0;
				left: 0;
				width: 40px;
				height: 40px;
				border: 4px solid #cfa6da;
				border-top-color: #772f91;
				border-radius: 50%;
				animation: loader-animation 1s infinite linear;
			}

			.load {
				display: none;
				margin-top: 50px;
				width: 90%;
				margin-left: 5%;
				height: 100px;
				text-align: center;
			}

			.empty {
				display: none;
				width: 90%;
				margin-left: 5%;
				height: 300px;
				text-align: center;
				line-height: 300px;
			}

			.card {
				display: none;
				padding: 15px;
				margin: 0 auto;
				width: 450px;
				background-color: #772f91;
			}

			a:hover {
				cursor: pointer;
			}

			.Lable {
				border-right: 2px solid #ececec;
				float: left;
				width: 130px;
				text-align: right;
				margin-right: 10px;
				line-height: 50px;
			}

			.Info {
				float: left;
				line-height: 50px;
				text-align: left;
			}
		}

		@media screen and (max-width: 800px) {
			.container {
				width: calc(100vw - 40px);
				margin-left: 20px;
				margin-bottom: 10px;
				min-height: 500px;
			}

			.container .searchBar {
				background-color: #f7f7f7;
				padding-top: 15px;
				padding-bottom: 10px;
				display: flex;
				border-top: 5px solid #772f91;
				flex-direction: column;
			}

			.label {
				font-size: 14px;
				text-align: left;
				padding-left: 20px;
				line-height: 30px;
				height: 30px;
				line-height: 30px;
				font-weight: bold;
				color: #777777;
			}

			.info {
				color: #8d8d8d;
				text-align: left;
				line-height: 30px;
				flex: 1;
			}

			.search {
				cursor: pointer;

				border: 0;
				background-color: #772f91;
				color: #fff;
				width: calc(100% - 40px);
				margin-left: 20px;
				height: 40px;
				font-size: 16px;
				margin-top: 20px;
			}

			.search:hover {
				opacity: 0.7;
			}

			.input {
				float: left;
				width: calc(100% - 40px);
				margin-left: 20px;
				font-size: 13px;
				height: 27px;
				text-indent: 15px;
				border-radius: 2px;
				border: 1px solid #bcbcbc;
			}

			.messgae {
				background-color: #f7f7f7;
				width: 100%;
				height: 25px;
				text-align: center;
				color: #ff5255;
				width: 90%;
				margin-left: 5%;
			}

			@keyframes loader-animation {
				0% {
					transform: rotate(0deg);
				}

				100% {
					transform: rotate(360deg);
				}
			}

			.loader {

				position: relative;
				width: 40px;
				height: 40px;
				margin-left: -47px;
			}

			.loader::before {
				content: "";
				position: absolute;
				top: 0;
				left: 0;
				width: 40px;
				height: 40px;
				border: 4px solid #cfa6da;
				border-top-color: #772f91;
				border-radius: 50%;
				animation: loader-animation 1s infinite linear;
			}

			.load {
				display: none;
				margin-top: 50px;
				width: 90%;
				margin-left: 5%;
				height: 100px;
				text-align: center;
			}

			.empty {
				display: none;
				width: 90%;
				margin-left: 5%;
				height: 300px;
				text-align: center;
				line-height: 300px;
			}

			.card {
				display: none;
				padding: 15px;
				margin: 0 auto;
				width: calc(100% - 30px);
				background-color: #772f91;
			}

			a:hover {
				cursor: pointer;
			}

			.Lable {
				border-right: 2px solid #ececec;
				float: left;
				width: 130px;
				text-align: right;
				margin-right: 10px;
				line-height: 50px;
			}

			.Info {
				float: left;
				line-height: 50px;
				text-align: left;
				font-size: 15px;
			}

			.stuName {
				font-size: 15px;
			}

			.stuLabel {
				width: auto !important;
			}
		}
	</style>
</head>

<body>
	<cms-component data="l_lxlhqx1y">head</cms-component>
	<div class="container" style="min-height: 700px;">
		<div style="width: 100%;height: 20px;margin-bottom: 20px;">
			<div style="float: left;">
				<a href="/" title="首页">首页</a>&nbsp;&nbsp;>&nbsp;&nbsp;
			</div>
			<div style="float: left;">
				录取查询
			</div>
		</div>
		<div class="searchBar">
			<div class="label">考生号:</div>
			<div class="info">
				<input id="stuId" value="" class="input" placeholder="请输入考生号" />
			</div>
			<div class="label">身份证后六位:</div>
			<div class="info">
				<input id="stuIdNo" value="" class="input" placeholder="请输入身份证后六位" />
			</div>
			<div class="info">
				<button class="search" onclick="search()">查询</button>
			</div>
		</div>

		<div class="messgae" id="message"></div>
		<div
			style="width: 70%;margin-left: 15%; line-height:23px;background-color: #f7f7f7;font-size:13px;color:#777777;padding-top:30px;background-color:#fff;">
			&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;请按提示要求准确输入您的信息进行查询。查询内容中显示的通知书信息仅为中国邮政EMS物流单号，您可以复制此编号在中国邮政速递物流中进行查询物流信息。我校所有录取通知书寄递工作严格按照教育部相关文件精神由中国邮政EMS统一跟踪派送，您可以根据物流单号直接拨打中国邮政热线11183。
			<br><br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;校咨询电话0791-83792888/83792998。
		</div>

		<div class="load" id="loading">
			<i class="loader"></i>
			<p style="margin-top: 43px;">正在查询</p>
		</div>
		<div class="empty" id="empty">

		</div>
		<div class="card" id="result">
			<div style="width: 100%;height: 100%;display: flex;flex-direction: column;">
				<div style="float: left;width: 100%;">
					<img src="/img/logo.jpg" style="float: left;width: 100%;">
				</div>
				<div
					style="overflow: hidden; display: flex;flex-direction: column; width: 100%;height: 520px;background-color: #fff;border-radius: 15px;margin-top: 10px;">
					<div
						style="font-size: 20px;color: #772f91;  width: 100%;height: 50px;background-color: #f9f9f9;border-bottom: 1px solid #bcbcbc;line-height: 50px;text-align: center;">
						录取结果
					</div>
					<div style="display: flex;width: 100%;" class="topInfo">
						<div class="stuLabel"
							style="margin-left: 20px; width: 70px;padding-top: 10px;padding-bottom: 10px;text-align: right;margin-right: 5px;color: #8d8d8d;">
							姓名：</div>
						<div style="padding-top: 10px;padding-bottom: 10px;text-align: left;color: #000;" id="name"
							class="stuName">
						</div>
						<div class="stuLabel"
							style="margin-left: 20px;width: 80px;padding-top: 10px;padding-bottom: 10px; text-align: right;margin-right: 5px;color: #8d8d8d;">
							考生号：</div>
						<div style="padding-top: 12px;padding-bottom: 12px;text-align: left;flex: 1;color: #000;"
							id="id"></div>
					</div>
					<div style="margin:10px;border: 2px solid #ececec;margin-top: 5px;border-radius: 3px;">
						<div style="height: 50px;">
							<div class="Lable">身份证：</div>
							<div class="Info" id="idNo"></div>
						</div>
						<div style="height: 50px;background-color: #f4f4f4;">
							<div class="Lable">分数：</div>
							<div class="Info" id="score"></div>
						</div>
						<div style="height: 50px;">
							<div class="Lable">录取状态：</div>
							<div class="Info" id="status"></div>
						</div>
						<div style="height: 50px;background-color: #f4f4f4;">
							<div class="Lable">录取院校：</div>
							<div class="Info" id="college"></div>
						</div>
						<div style="height: 50px;">
							<div class="Lable">录取批次：</div>
							<div class="Info" id="batch"></div>
						</div>
						<div style="height: 50px;background-color: #f4f4f4;">
							<div class="Lable">录取专业：</div>
							<div class="Info" id="major"></div>
						</div>
						<div style="height: 50px;">
							<div class="Lable">科目类别：</div>
							<div class="Info" id="type"></div>
						</div>
						<div style="height: 50px;background-color: #f4f4f4;">
							<div class="Lable">录取通知书邮编：</div>
							<div class="Info">
								<a href=" https://www.ems.com.cn/" target="_blank" style="color: #403aff;"
									id="postNo"></a>
							</div>

						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<cms-component>foot</cms-component>
</body>

</html>
<script src="./js/AdmissionInquiry.js"></script>
<script src="./js/FinalCms.js"></script>
