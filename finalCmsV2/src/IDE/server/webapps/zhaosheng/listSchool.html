<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <!-- 禁止百度转码 -->
    <meta http-equiv="Cache-Control" content="no-siteapp">
    <!-- uc强制竖屏 -->
    <meta name="screen-orientation" content="portrait">
    <!-- QQ强制竖屏 -->
    <meta name="x5-orientation" content="portrait">
    <!-- {dreamer-cms:category field="typenamecn" /}_{dreamer-cms:global name="title"/} -->
    <title>媒体江软</title>
    <meta name="Keywords" content="{dreamer-cms:global name=" keywords"/}" />
    <meta name="Description" content="{dreamer-cms:global name=" describe"/}" />
    <link rel="stylesheet" href="./css/listSchool.css">
</head>

<body>
    <cms-component data="l_lxlhqx1y">head</cms-component>
    <div class="productNews" id="productNews">


        <div class="wrapper_1200">
            <div class="dreamer-location">
                <div>
                    <a style="text-decoration: none;" href="/" title="首页">首页</a>
                </div>
                <div style="margin-left: 15px;">
                    媒体江软
                </div>
            </div>
        </div>
        <div class="conter wrapper_1200" style="margin-top: 30px;">
            <div class="left">
                <div class="publicLists">
                    <cms-list data="l_ly8dm0js">
                        <list-node class="publicList" page="1" limit="10">
                            <div class="item details" data-id="[field:id/]"
                                style="padding-bottom: 0;display: flex;max-height: 150px;">
                                <div class="text dis">
                                    <node-template class="name" style="text-align: left;">
                                        <node-title></node-title>
                                    </node-template>
                                    <node-date class="icons" format="YYYY-MM-DD">
                                    </node-date>
                                    <node-note></node-note>
                                </div>
                            </div>
                            <list-pagination></list-pagination>
                        </list-node>
                    </cms-list>

                </div>
            </div>

            <div class="right">
                <div class="newsHead">
                    <div class="title">通知公告</div>
                    <cms-list data="l_ly8ed4q5">
                        <list-node class="list" style="display: flex;flex-direction: column;width: 432px;" page="1"
                            limit="10">
                            <div class="item details" style="width: 432px; " data-id="[field:id/]">
                                <div class="dis text" style="width: 370px;  border-bottom: 1px dashed #e2e2e2;">
                                    <node-template class="line1"><node-title></node-title> </node-template>
                                </div>
                            </div>
                        </list-node>
                    </cms-list>
                </div>
                <div class="technology">
                    <div class="title">行业新闻</div>
                    <cms-list data="l_ly8edbt0">
                        <list-node class="list"
                            style="display: flex;flex-direction: column;width: 392px;padding-bottom: 20px;" page="1"
                            limit="10">
                            <div class="item details" style="width: 392px;" data-id="[field:id/]">
                                <div class="dis text" style="width: 370px;">
                                    <node-template class="line1"><node-title></node-title> </node-template>
                                </div>
                            </div>
                        </list-node>
                    </cms-list>
                </div>
            </div>
        </div>
        <div class="clearfix"></div>
    </div>
    <cms-component>foot</cms-component>
</body>
