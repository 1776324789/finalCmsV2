<style>
    html,
    body {
        padding: 0;
        margin: 0;
    }

    .WEBHEAD .list {
        display: flex;
    }

    .WEBHEAD .contentName {
        color: #fff;
        height: 40px;
        text-align: center;
        line-height: 40px;
        min-width: 70px;
        padding-left: 20px;
        padding-right: 20px;
        cursor: pointer;
        font-size: 16px;
    }

    .WEBHEAD .contentName:hover {
        color: #55aaff;
    }

    .WEBHEAD .floatWindow {
        z-index: 10;
        background-color: #fff;
        position: absolute;
        display: none;
        box-shadow: 0 0 3px #b9b9b9;
        flex-direction: column;
    }

    .WEBHEAD .row:hover .floatWindow {
        animation: slideIn 0.25s ease forwards;
        display: flex;

    }

    @keyframes slideIn {
        0% {
            transform: translateY(50px);
            opacity: 0;
        }

        100% {
            transform: translateY(0);
            opacity: 1;
        }
    }

    .WEBHEAD .menuOption {
        height: 45px;
        text-align: center;
        line-height: 45px;
        width: 100px;
        cursor: pointer;
        font-size: 14px;
    }

    .WEBHEAD .menuOption:hover {
        background-color: #e9e9e9;
    }

    .WEBHEAD .menuBlock {
        width: 100vw;
        display: flex;
        background-color: #393c41;
    }

    .WEBHEAD .pageTopBlock {
        width: 100vw;
        height: 70px;
        background-color: #772f91 !important;
        display: flex;
    }

    .WEBHEAD .topBlockTitle {
        font-size: 30px;
        line-height: 70px;
        margin-left: 30px;
        color: #fff;
    }

    .WEBHEAD .searchBlock {
        margin-right: 100px;
    }

    .WEBHEAD .inputBlock {
        display: flex;
        margin-top: 17px;
        overflow: hidden;
        width: 250px;
        border-radius: 18px;
        height: 36px;
        background-color: #fff;
        border: 1px solid #bfbfbf;
    }

    .WEBHEAD .inputBlock input {
        height: 30px;
        flex: 1;
        text-indent: 15px;
        border: 0;
        margin-top: 2px;
        outline: none;
    }

    .WEBHEAD .row {
        position: relative;
    }

    .WEBHEAD .searchButton {
        margin-top: 3px;
        border: 0;
        margin-right: 3px;
        cursor: pointer;
        border-radius: 15px;
        width: 30px;
        height: 30px;
    }

    .WEBHEAD .searchButton:hover {
        color: #55aaff;
        background-color: #eeeeee;
    }


    @media screen and (min-width: 800px) {
        .WEBHEAD {
            display: block;
        }

        .PHONEHEAD {
            display: none;
        }

        .setUp {
            display: none;
        }
    }

    @media screen and (max-width: 800px) {
        .WEBHEAD {
            display: none;
        }

        .PHONEHEAD {
            z-index: 10000000;
            display: block;
            position: fixed;
            width: 100vw;
        }

        .setUp {
            display: block;
        }
    }

    .PHONEHEAD .childBlock {
        height: 35px;

        line-height: 35px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
