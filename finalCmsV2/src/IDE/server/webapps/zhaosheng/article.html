<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        @media screen and (min-width: 800px) {
            .contentBlock {
                width: 1200px;
                margin-left: calc((100vw - 1200px)/2);
            }

            .title {
                font-size: 40px;
                font-weight: bold;
                text-align: center;
                margin-top: 30px;
                padding-bottom: 20px;
                border-bottom: 1px solid #e3e3e3;
                margin-bottom: 15px;
            }
        }

        @media screen and (max-width: 800px) {
            .contentBlock {
                width: calc(100vw - 40px);
                padding-left: 20px;
                padding-right: 20px;
            }

            .contentBlock img,
            p {
                margin-left: 0 !important;
                width: 100% !important;
                text-indent: 0 !important;
            }

            .title {
                font-size: 25px;
                font-weight: bold;
                text-align: center;
                margin-top: 30px;
                padding-bottom: 20px;
                border-bottom: 1px solid #e3e3e3;
                margin-bottom: 15px;
            }
        }
    </style>
    <cms-component data="l_lxlhqx1y">head</cms-component>
    <cms-node>
        <h1> {{title}}</h1>
        <node-content></node-content>
    </cms-node>
    <cms-component>foot</cms-component>
</body>

</html>
