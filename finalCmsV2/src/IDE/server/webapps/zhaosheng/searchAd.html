	/**
 * 字符串加密解密工具（基于XOR对称加密）
 * 使用一个字符串作为密钥，对另一个字符串进行加密和解密。
 * 加密结果以十六进制字符串形式输出，便于存储和传输。
 */

	// ---------- 辅助函数 ----------
	/**
	 * 将字符串转换为Uint8Array（UTF-8编码）
	 * @param {string} str - 输入字符串
	 * @returns {Uint8Array} UTF-8字节数组
	 */
	function stringToUint8Array(str) {
		return new TextEncoder().encode(str);
	}

	/**
	 * 将Uint8Array转换为字符串（UTF-8解码）
	 * @param {Uint8Array} uint8Array - 字节数组
	 * @returns {string} 解码后的字符串
	 */
	function uint8ArrayToString(uint8Array) {
		return new TextDecoder().decode(uint8Array);
	}

	/**
	 * 将字节数组转换为十六进制字符串
	 * @param {Uint8Array} bytes - 字节数组
	 * @returns {string} 十六进制字符串，如 "a1b2c3"
	 */
	function bytesToHex(bytes) {
		return Array.from(bytes, byte => byte.toString(16).padStart(2, '0')).join('');
	}

	/**
	 * 将十六进制字符串转换为字节数组
	 * @param {string} hex - 十六进制字符串（必须偶数长度）
	 * @returns {Uint8Array} 字节数组
	 */
	function hexToBytes(hex) {
		const len = hex.length / 2;
		const bytes = new Uint8Array(len);
		for (let i = 0; i < len; i++) {
			bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
		}
		return bytes;
	}

	/**
	 * 对数据字节数组与密钥字节数组进行XOR运算（对称操作，加密解密通用）
	 * @param {Uint8Array} data - 待处理的数据字节
	 * @param {Uint8Array} keyBytes - 密钥字节数组
	 * @returns {Uint8Array} XOR运算后的字节数组
	 */
	function xorBytes(data, keyBytes) {
		const result = new Uint8Array(data.length);
		for (let i = 0; i < data.length; i++) {
			// 循环使用密钥字节
			result[i] = data[i] ^ keyBytes[i % keyBytes.length];
		}
		return result;
	}

	// ---------- 加密/解密主函数 ----------
	/**
	 * 使用密钥加密明文字符串
	 * @param {string} plaintext - 要加密的原始字符串
	 * @param {string} key - 密钥字符串（不能为空）
	 * @returns {string} 加密后的十六进制字符串
	 * @throws {Error} 如果密钥为空则抛出错误
	 */
	function encrypt(plaintext, key) {
		if (!key) throw new Error("密钥不能为空");
		const plainBytes = stringToUint8Array(plaintext);
		const keyBytes = stringToUint8Array(key);
		const encryptedBytes = xorBytes(plainBytes, keyBytes);
		return bytesToHex(encryptedBytes);
	}

	/**
	 * 使用密钥解密密文（十六进制字符串）
	 * @param {string} ciphertextHex - 由encrypt函数生成的十六进制密文
	 * @param {string} key - 密钥字符串（必须与加密时使用的密钥相同）
	 * @returns {string} 解密后的原始字符串
	 * @throws {Error} 如果密钥为空则抛出错误
	 */
	function decrypt(ciphertextHex, key) {
		if (!key) throw new Error("密钥不能为空");
		const encryptedBytes = hexToBytes(ciphertextHex);
		const keyBytes = stringToUint8Array(key);
		const decryptedBytes = xorBytes(encryptedBytes, keyBytes);
		return uint8ArrayToString(decryptedBytes);
	}
