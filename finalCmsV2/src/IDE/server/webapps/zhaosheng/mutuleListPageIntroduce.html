<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
    </title>
    <style>
        @media screen and (min-width: 800px) {
            .mainBlock {
                display: flex;
                flex-direction: column;
                width: 1000px;
                min-height: 750px;
                margin-left: calc((100% - 1000px) / 2);
            }

            .bottomContentBLock {
                min-height: 500px;
                margin-top: 15px;
                display: flex;
            }

            .leftBlock {
                margin-top: 10px;
                width: 233px;
                padding-right: 15px;
                margin-right: 30px;
                border-right: 1px solid #e3e3e3;
            }

            .topBigTitle {
                background-color: #772f91;
                height: 54px;
                line-height: 54px;
                width: 233px;
                font-size: 1.8rem;
                text-align: center;
                font-weight: bold;
                color: #fff;
            }

            .menuName {
                cursor: pointer;
                height: 53px;
                border-bottom: 1px solid #e3e3e3;
                text-align: center;
                line-height: 53px;
            }

            .menuName:hover {
                background-color: #f5f5f5;
                color: #772f91;
            }

            .newLine {
                cursor: pointer;
                display: flex;
                height: 30px;
                line-height: 30px;
                margin-bottom: 5px;
                border-bottom: 1px solid #efefef;
                -webkit-box-orient: vertical;
                -webkit-line-clamp: 1;
                overflow: hidden;
            }

            .newLine2 {
                font-weight: bold;
                display: flex;
                height: 30px;
                line-height: 30px;
                margin-bottom: 5px;
                border-bottom: 1px solid #efefef;
                -webkit-box-orient: vertical;
                -webkit-line-clamp: 1;
                overflow: hidden;
                cursor: pointer;
            }

            .newLine2:hover {
                background-color: #efefef;
            }

            .newLine:hover {
                background-color: #efefef;
            }

            .lineContent {
                color: #666666;
                flex: 1;
            }

            .lineDate {
                color: #999999;
                font-size: 13px;
            }

            .page {
                margin: auto;
                margin-top: 20px;
            }

            .bread {
                display: flex;
                font-size: 15px;
                border-bottom: 2px solid #772f91;
                padding-bottom: 5px;
                margin-bottom: 15px;
                color: #772f91;
            }

            .bread .content {
                cursor: pointer;
                font-weight: bold;
            }

            .bread .content:hover {
                opacity: 0.75;
            }
        }

        @media screen and (max-width: 800px) {
            .mainBlock {
                display: flex;
                flex-direction: column;
                width: calc(100vw - 40px);
                min-height: 500px;
                margin-left: 20px;
            }

            .bottomContentBLock {
                min-height: 500px;
                margin-top: 15px;
                display: flex;
            }

            .leftBlock {
                display: none;
                margin-top: 10px;
                width: 233px;
                padding-right: 15px;
                margin-right: 30px;
                border-right: 1px solid #e3e3e3;
            }

            .topBigTitle {

                background-color: #772f91;
                height: 54px;
                line-height: 54px;
                width: 233px;
                font-size: 1.8rem;
                text-align: center;
                font-weight: bold;
                color: #fff;
            }

            .menuName {
                cursor: pointer;
                height: 53px;
                border-bottom: 1px solid #e3e3e3;
                text-align: center;
                line-height: 53px;
            }

            .menuName:hover {
                background-color: #f5f5f5;
                color: #772f91;
            }

            .newLine {
                cursor: pointer;
                display: flex;
                height: 30px;
                line-height: 30px;
                margin-bottom: 5px;
                border-bottom: 1px solid #efefef;
                -webkit-box-orient: vertical;
                -webkit-line-clamp: 1;
                overflow: hidden;
            }

            .newLine:hover {
                background-color: #efefef;
            }

            .lineContent {
                color: #666666;
                flex: 1;
            }

            .lineDate {
                color: #999999;
                font-size: 13px;
            }

            .page {
                margin: auto;
                margin-top: 20px;
            }

            .bread {
                display: flex;
                font-size: 15px;
                border-bottom: 2px solid #772f91;
                padding-bottom: 5px;
                margin-bottom: 15px;
                color: #772f91;
            }

            .bread .content {
                cursor: pointer;
                font-weight: bold;
            }

            .bread .content:hover {
                opacity: 0.75;
            }
        }

        .contentChild:hover {
            opacity: 0.8;
            background-color: #f5f5f5;
        }

    </style>
</head>

<body>
    <cms-component data="l_lxlhqx1y">head</cms-component>
    <div class="mainBlock">
        <div class="bottomContentBLock">
            <cms-list class="leftBlock">
                <list-parent>
                    <list-name class="topBigTitle"></list-name>
                    <list-list>
                        <list-template>
                            <list-name class="menuName"></list-name>
                        </list-template>
                    </list-list>
                </list-parent>
            </cms-list>
            <cms-list style="margin-top: 15px;flex: 1;" pagetitle>
                <cms-list class="bread">
                    <div class="content" onclick="window.location.href=BaseURL+'/index.html'">
                        首页
                    </div>
                    >&nbsp;&nbsp;
                    <list-parent>
                        <list-name class="content"></list-name>
                    </list-parent>
                    &nbsp;&nbsp;>&nbsp;&nbsp;
                    <list-name class="content"></list-name>
                </cms-list>
                <div class="newLine2" id="openMajor_2025">
                    <div class="lineContent">2025年专业列表（点击收缩查看）</div>
                </div>
                <cms-list data="l_mbq9zy4j" style="margin-left: 20px;overflow:hidden;height:0px;" id="mojarList_2025">
                    <list-list>
                        <list-name style="line-height: 30px;color: #333;font-size:16px;font-weight:bold;"></list-name>
			<list-list>
                        	<list-name style="margin-left:25px;line-height: 30px;color: #333;font-weight:bold;"></list-name>
				<list-list>
                        		<list-name style="margin-left:50px;line-height: 30px;color: #666;"></list-name>
					<list-node>
						<node-template>
							<node-title  style="margin-left:75px;border-bottom: 1px solid #f5f5f5;line-height: 30px;color: #55aaff;text-indent: 10px; cursor: pointer;"
                                       			 class="contentChild"></node-title>
						</node-template>
					</list-node>
                   		</list-list>
				<list-node>
					<node-template>
						<node-title  style="margin-left:75px;border-bottom: 1px solid #f5f5f5;line-height: 30px;color: #55aaff;text-indent: 10px; cursor: pointer;"
                                       			class="contentChild"></node-title>
					</node-template>
				</list-node>

                   	</list-list>
                    </list-list>
                </cms-list>

                <div class="newLine2" id="openMajor_2024">
                    <div class="lineContent">2024年专业列表（点击收缩查看）</div>
                </div>
                <cms-list data="l_m18sd4ya" style="margin-left: 20px;overflow:hidden;height:0px;" id="mojarList_2024">
                    <list-list>
                        <div>
                            <list-name
                                style="border-bottom: 1px solid #f5f5f5;line-height: 30px;color: #666;"></list-name>
                            <list-node style="margin-left: 20px">
                                <node-template>
                                    <node-title
                                        style="border-bottom: 1px solid #f5f5f5;line-height: 30px;color: #55aaff;text-indent: 10px; cursor: pointer;"
                                        class="contentChild"></node-title>
                                </node-template>
                            </list-node>
                        </div>
                    </list-list>
                </cms-list>
                <list-node limit="15" order="desc" style="display: flex;flex-direction: column;">
                    <node-template class="newLine">
                        <node-title class="lineContent"></node-title>
                        <node-date format="YYYY-MM-DD" class="lineDate"></node-date>
                    </node-template>
                    <!--<list-pagination class="page"></list-pagination>-->
                </list-node>

            </cms-list>
        </div>
    </div>
    <script>
        const mojarList_2024 = document.getElementById("mojarList_2024")
        const openMajor_2024 = document.getElementById("openMajor_2024")
        let open_2024 = false;
        openMajor_2024.onclick = () => {
            if (open_2024) {
                mojarList_2024.style.height = "0px";
                open_2024 = false
            } else {
                mojarList_2024.style.height = "auto";
                open_2024 = true
            }

        }


   const mojarList_2025 = document.getElementById("mojarList_2025")
        const openMajor_2025 = document.getElementById("openMajor_2025")
        let open_2025 = false;
        openMajor_2025.onclick = () => {
            if (open_2025) {
                mojarList_2025.style.height = "0px";
                open_2025 = false
            } else {
                mojarList_2025.style.height = "auto";
                open_2025 = true
            }

        }
    </script>
    <cms-component>foot</cms-component>
</body>
