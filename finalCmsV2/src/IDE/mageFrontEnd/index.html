<style>
  .confirmWindow {
    display: block;
    position: fixed;
    top: 40vh;
    left: 50%;
    transform: translateX(-50%);
    width: 80vw;
    border-radius: 15px;
    padding: 15px;
    background-color: #fff;
    z-index: 10001;
    animation: slideIn 0.25s ease forwards;
  }

  .confirmCover {
    display: block;
    position: fixed;
    width: 100vw;
    height: 100vh;
    left: 0;
    top: 0;
    background-color: rgba(0, 0, 0, 0.15);
    backdrop-filter: blur(2px);
    z-index: 10000;
  }

  .confirmWindowTitle {
    font-size: 18px;
    color: #333;
    font-weight: bold;
    line-height: 30px;
    margin-bottom: 15px;
  }

  .confirmWindowInfo {
    font-size: 14px;
    color: #666;
  }

  .confirmWindowBar {
    display: flex;
    margin-top: 30px;
  }

  .confirmWindowBar button {
    flex: 1;
    margin: 5px;
    height: 40px;
    font-size: 14px;
    border-radius: 10px;
  }

  .confirmBlockTextarea {
    width: calc(100% - 25px);
    font-size: 14px;
    padding: 10px;
    border-radius: 3px;
    border: 1px solid #ddd;
    margin-top: 15px;
    resize: none;
  }

  .confirmWindowWordLimit {
    margin-top: 10px;
    text-align: right;
    font-size: 14px;
    margin-right: 5px;
    color: #888;
  }

  .confirmCancelButton {
    background-color: #fff;
    border: 1px solid #999;
  }

  .confirmConfirmButton {
    background-color: #fff;
    border: 1px solid #fff;
    color: #fff;
  }
</style>

<body>

  <div id="app"></div>
  <script>
    function getMaxZIndex() {
      let maxZIndex = 0; // 初始化最大zIndex为0
      const elements = document.querySelectorAll('*'); // 选择页面中的所有元素

      elements.forEach((element) => {
        const zIndex = window.getComputedStyle(element).zIndex; // 获取元素的z-index样式

        if (!isNaN(zIndex)) { // 检查z-index是否为有效数字
          maxZIndex = Math.max(maxZIndex, parseInt(zIndex, 10)); // 更新最大zIndex
        }
      });
      return maxZIndex;
    }

    function toast(text, time = 2000) {
      let toastElement = document.createElement("div")
      toastElement.classList.add("Toast")
      toastElement.textContent = text
      document.body.appendChild(toastElement)
      toastElement.style.zIndex = getMaxZIndex()
      setTimeout(() => {
        document.body.removeChild(toastElement)
      }, time);
    }



    const OA = new class OAImpl {
      constructor() {
        this.userOaData
        this.functionMap = {}
        this.missionFunctionCall = {}
        this.missionId = Date.now()
        this.init()
      }

      addMission(action, data, callback) {

        let missionId
        if (callback) {
          this.missionId++
          missionId = this.missionId.toString(36)
          this.missionFunctionCall[missionId] = callback
        }
        let req = {
          action: action,
          data: data,
          missionId: missionId
        }
        window.parent.postMessage(req, "*")
      }

      init() {
        window.addEventListener("message", (event) => {
          if (event.data.missionId == null) return
          else this.missionFunctionCall[event.data.missionId](event.data.data)
        });
      }
    }

    function confirm(setting) {
      let ele = getConfirmWindow()
      if (setting.title) ele.confirmWindowTitle.innerText = setting.title
      if (setting.content) ele.confirmWindowInfo.textContent = setting.content
      if (setting.cancelText) ele.confirmCancelButton.innerText = setting.cancelText
      if (setting.confirmText) ele.confirmConfirmButton.innerText = setting.confirmText
      if (setting.input) {
        ele.confirmWindowWordLimit.style.display = "block"
        ele.confirmBlockTextarea.style.display = "block"
      }
      else {
        ele.confirmWindowWordLimit.style.display = "none"
        ele.confirmBlockTextarea.style.display = "none"
      }
      if (setting.inputLimit != null) {
        ele.confirmWindowWordLimit.innerText = "0/" + setting.inputLimit
        ele.confirmBlockTextarea.onkeyup = (e) => {
          ele.confirmBlockTextarea.value = ele.confirmBlockTextarea.value.substring(0, setting.inputLimit)
          ele.confirmWindowWordLimit.innerText = ele.confirmBlockTextarea.value.length + "/" + setting.inputLimit
        }
      } else {
        ele.confirmBlockTextarea.onkeyup = null
      }

      if (setting.placeholder != null) ele.confirmBlockTextarea.placeholder = setting.placeholder
      else ele.confirmBlockTextarea.placeholder = "请输入内容"

      ele.confirmCancelButton.onclick = () => {
        if (setting.cancel) setting.cancel()
        ele.confirmCover.style.display = "none"
        ele.confirmWindow.style.display = "none"
        document.body.removeChild(ele.confirmCover)
        document.body.removeChild(ele.confirmWindow)
      }

      ele.confirmConfirmButton.onclick = () => {
        if (setting.confirm) setting.confirm(ele.confirmBlockTextarea.value)
        document.body.removeChild(ele.confirmCover)
        document.body.removeChild(ele.confirmWindow)
      }
      ele.confirmCover.onclick = ele.confirmConfirmButton.onclick
    }

    function dc(tag, className) {
      const element = document.createElement(tag)
      if (typeof className == "string") {
        element.classList.add(className)
      } else {
        element.classList.add(...className)
      }
      element["add"] = (ele) => {
        element.appendChild(ele)
        return element
      }
      element["txt"] = (txt) => {
        element.innerText = txt
        return element
      }
      return element
    }
    //  <div class="confirmCover" id="confirmCover"></div>


    //   <div class="confirmWindow" id="confirmWindow">
    //     <div class="confirmWindowTitle" id="confirmWindowTitle">确认</div>
    //     <div class="confirmWindowInfo" id="confirmWindowInfo">确认取消申请？</div>
    //     <textarea id="confirmBlockTextarea" class="confirmBlockTextarea" placeholder="请输入取消理由"></textarea>
    //     <div id="confirmWindowWordLimit" class="confirmWindowWordLimit">0/100</div>
    //     <div class="confirmWindowBar">
    //       <button class="confirmCancelButton" id="confirmCancelButton">取消</button>
    //       <button class="confirmConfirmButton" id="confirmConfirmButton">确认</button>
    //     </div>
    //   </div>
    function getConfirmWindow() {
      let element = dc("div", "confirmWindow")
        .add(dc("div", "confirmWindowTitle"))
        .add(dc("div", "confirmWindowInfo"))
        .add(dc("textarea", "confirmBlockTextarea"))
        .add(dc("div", "confirmWindowWordLimit"))
        .add(dc("div", "confirmWindowBar").add(dc("button", "confirmCancelButton").txt("取消")).add(dc("button", "confirmConfirmButton").txt("确认")))
      let res = {}
      Array.from(element.querySelectorAll("*")).forEach(item => {
        res[item.className] = item
      })
      res['confirmCover'] = dc("div", "confirmCover")
      res['confirmWindow'] = element
      document.body.appendChild(res.confirmCover)
      document.body.appendChild(element)
      return res
    }

  </script>
